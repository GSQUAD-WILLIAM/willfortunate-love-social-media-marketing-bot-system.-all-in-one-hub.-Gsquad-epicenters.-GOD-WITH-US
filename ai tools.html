            gap: 4px;

            padding: 4px 8px;
            border-radius: 30px;
            border: 1px solid #00ccff;

            left: -4px;

        video,

        audio,
        iframe,
        embed,

        .micro-card,

        @media (max-height: 600px) {
            #categoriesContainer {
                margin-bottom: 65px;
            }

            .quick-menu {
                max-height: 60vh;
            }
        }
    </style>
</head>

                const tools = G[cat];
                if (!tools || !tools.length) continue;
                catsHtml += `<div class="category-section" data-category="${cat}"><div class="section-header"><span class="section-icon">${ICON_MAP[cat] || '🔧'}</span><span class="section-title">${cat}</span><span class="section-count">${tools.length}</span></div><div class="mini-grid">`;
                for (let i = 0; i < tools.length; i++) {
                    const t = tools[i];
                    catsHtml += `<div class="micro-card" data-url="${t.u}"><div class="micro-icon">${t.i}</div><div class="micro-name">${t.n}</div><div class="micro-badge">${t.s}</div></div>`;
                }
                catsHtml += `</div></div>`;
            }
            document.getElementById('categoriesContainer').innerHTML = catsHtml;

            // Quick menu
            let quickHtml = '';
            for (let c = 0; c < CAT_ORDER.length; c++) {
                const cat = CAT_ORDER[c];
                const tools = G[cat];
                if (!tools || !tools.length) continue;
                quickHtml += `<div class="quick-category"><div class="quick-category-title">${cat}</div><div class="quick-items">`;
                const sliceEnd = tools.length > 4 ? 4 : tools.length;
                for (let i = 0; i < sliceEnd; i++) {
                    const t = tools[i];
                    quickHtml += `<div class="quick-item" data-url="${t.u}"><span>${t.i}</span><span>${t.n}</span></div>`;
                }
                quickHtml += `</div></div>`;
            }
            document.getElementById('quickMenuContent').innerHTML = quickHtml;

            // ---------- INSTANT BACK BUTTON (EXIT BROWSER) ----------
            const backBtn = document.getElementById('backBtn');
            backBtn.addEventListener('click', function (e) {
                e.preventDefault();
                e.stopPropagation();
                // Attempt to close the tab/window
                window.close();
                // Fallback for browsers that block window.close()
                window.location.href = 'about:blank';
            });

            // ---------- SINGLE EVENT DELEGATE (max speed) ----------
            const quickMenuEl = document.getElementById('quickMenu');
            const quickToggleEl = document.getElementById('quickToggle');

            document.addEventListener('click', function (e) {
                let target = e.target.closest('[data-url], .category-tab, .quick-toggle');
                if (!target) return;

                // Quick toggle
                if (target.classList.contains('quick-toggle') || target.id === 'quickToggle') {
                    e.preventDefault();
                    quickMenuEl.classList.toggle('show');
                    return;
                }

                // Category filter
                if (target.classList.contains('category-tab')) {
                    e.preventDefault();
                    const cat = target.dataset.cat;
                    // update active class
                    const tabs = document.querySelectorAll('.category-tab');
                    for (let i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
                    target.classList.add('active');

                    const sections = document.querySelectorAll('.category-section');
                    if (cat === 'all') {
                        for (let i = 0; i < sections.length; i++) sections[i].style.display = 'block';
                    } else {
                        for (let i = 0; i < sections.length; i++) {
                            sections[i].style.display = sections[i].dataset.category === cat ? 'block' : 'none';
                        }
                    }
                    return;
                }

                // URL open (featured, micro, quick)
                if (target.dataset.url) {
                    e.preventDefault();
                    window.open(target.dataset.url, '_blank');
                }
            });

            // Search (fast enough, single loop)
            document.getElementById('searchInput').addEventListener('input', function (e) {
                const term = this.value.toLowerCase();
                const cards = document.querySelectorAll('.micro-card');
                for (let i = 0; i < cards.length; i++) {
                    const card = cards[i];
                    const name = card.querySelector('.micro-name')?.textContent.toLowerCase() || '';
                    const badge = card.querySelector('.micro-badge')?.textContent.toLowerCase() || '';
                    card.style.display = (name.includes(term) || badge.includes(term)) ? 'flex' : 'none';
                }
            });

            // Outside click to close quick menu
            document.addEventListener('click', function (e) {
                if (!quickMenuEl || !quickToggleEl) return;
                if (!quickToggleEl.contains(e.target) && !quickMenuEl.contains(e.target)) {
                    quickMenuEl.classList.remove('show');
                }
            });

            // Ensure first tab active
            document.querySelector('.category-tab')?.classList.add('active');
        })();
    </script>
</body>

</html>

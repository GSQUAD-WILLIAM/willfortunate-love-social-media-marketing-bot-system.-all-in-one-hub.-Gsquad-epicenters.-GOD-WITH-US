<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Willfortunate Player - ZERO EGRESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏯️</text></svg>">
    <style>
        /* Keep your existing CSS exactly the same - no changes needed */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen-Sans, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            color: #f1f1f1;
            min-height: 100vh;
            position: relative;
            background: #000;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: #000;
        }

        .background-media {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.5s ease-in-out;
            background: #000;
            will-change: opacity;
            pointer-events: none;
        }

        .background-media.active {
            opacity: 1;
            z-index: 3;
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        .floating-name {
            position: fixed;
            font-size: 1.2rem;
            font-weight: 700;
            color: #7b2ff7;
            z-index: 2000;
            opacity: 0;
            animation: floatName 15s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(123, 47, 247, 0.5);
            pointer-events: none;
        }

        @keyframes floatName {

            0%,
            5% {
                opacity: 0;
                transform: translateY(-20px) scale(0.8);
            }

            10%,
            90% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            95%,
            100% {
                opacity: 0;
                transform: translateY(20px) scale(0.8);
            }
        }

        .modal-container {
            width: 90%;
            max-width: 300px;
            background: rgba(25, 25, 40, 0.95);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: block;
            animation: slideInRight 0.3s ease;
        }

        .modal-container.compact {
            max-width: 280px;
        }

        .glitter-border {
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 13px;
            background: linear-gradient(45deg, transparent 40%, #7b2ff7 50%, #f107a3 60%, transparent 70%);
            background-size: 300% 300%;
            z-index: -1;
            animation: glitterMove 8s linear infinite;
            filter: blur(1px);
            opacity: 0.7;
        }

        .modal-content {
            position: relative;
            border-radius: 12px;
            background: rgba(25, 25, 40, 0.95);
            overflow: hidden;
        }

        .star-close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            color: #7b2ff7;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            font-size: 0.9rem;
            animation: starRotate 3s linear infinite;
        }

        @keyframes starRotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .main-content {
            padding: 15px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            position: relative;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 8px;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(123, 47, 247, 0.3);
            border-radius: 15px;
            padding: 10px 12px 10px 35px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #7b2ff7;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(170, 170, 255, 0.8);
            font-size: 0.9rem;
        }

        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 2000;
            background: rgba(123, 47, 247, 0.9);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(123, 47, 247, 0.4);
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 4px;
            background: linear-gradient(90deg, #7b2ff7, #f107a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }

        .subtitle {
            color: rgba(170, 170, 255, 0.8);
            font-size: 0.7rem;
        }

        .upload-container {
            margin-bottom: 10px;
            display: flex;
            justify-content: flex-end;
        }

        .upload-music-btn {
            background: linear-gradient(135deg, #7b2ff7, #f107a3);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(123, 47, 247, 0.3);
            letter-spacing: 0.5px;
        }

        .upload-music-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(241, 7, 163, 0.4);
        }

        .upload-music-btn:active {
            transform: translateY(0);
        }

        .upload-music-btn i {
            font-size: 0.7rem;
        }

        .hidden-input {
            display: none;
        }

        .uploaded-songs {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .uploaded-songs h3 {
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: rgba(170, 170, 255, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-all-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 3px;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.07);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            animation: slideIn 0.05s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-3px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .song-item.active {
            background: rgba(123, 47, 247, 0.2);
            border-left: 3px solid #f107a3;
        }

        .song-item.unavailable {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .song-item.unavailable:hover {
            background: rgba(255, 100, 100, 0.1);
        }

        .song-item i {
            color: #7b2ff7;
            margin-right: 10px;
            font-size: 0.9rem;
        }

        .song-details {
            flex: 1;
            overflow: hidden;
        }

        .song-item-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
            font-weight: 500;
        }

        .song-item-info {
            font-size: 0.7rem;
            color: rgba(170, 170, 255, 0.8);
            display: flex;
            justify-content: space-between;
        }

        .song-item-remove {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 4px;
            margin-left: 4px;
            z-index: 5;
        }

        .empty-songs {
            text-align: center;
            color: rgba(170, 170, 255, 0.6);
            font-size: 0.8rem;
            padding: 20px 10px;
        }

        .dashboard {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 90%;
            max-width: 280px;
            background: rgba(20, 20, 35, 0.95);
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: block;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 11px;
            background: linear-gradient(45deg, transparent 40%, #7b2ff7 50%, #f107a3 60%, transparent 70%);
            background-size: 300% 300%;
            animation: glitterMove 5s linear infinite;
            filter: blur(1px);
            opacity: 0.7;
            z-index: -1;
        }

        .dashboard-header {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .album-art-nano {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            background: linear-gradient(135deg, #2a2a4a, #1a1a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .album-art-nano i {
            color: #7b2ff7;
            font-size: 1rem;
        }

        .song-info-nano {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }

        .song-title-nano {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .song-artist-nano {
            font-size: 0.7rem;
            color: rgba(170, 170, 255, 0.9);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls-nano {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }

        .control-btn-nano {
            background: rgba(123, 47, 247, 0.2);
            border: none;
            color: #7b2ff7;
            font-size: 0.9rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .play-pause-nano {
            background: linear-gradient(135deg, #7b2ff7, #f107a3);
            width: 36px;
            height: 36px;
            font-size: 1rem;
        }

        .expanded-controls {
            padding: 12px;
            display: none;
        }

        .dashboard.expanded .expanded-controls {
            display: block;
        }

        .progress-section {
            margin-bottom: 10px;
        }

        .progress-bar-nano {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
            cursor: pointer;
        }

        .progress-nano {
            height: 100%;
            background: linear-gradient(90deg, #7b2ff7, #f107a3);
            width: 0%;
            transition: width 0.1s;
        }

        .time-info-nano {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: rgba(170, 170, 255, 0.8);
        }

        .player-controls-nano {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .player-btn-nano {
            background: none;
            border: none;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .bottom-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .volume-control-nano {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }

        .volume-icon {
            color: rgba(170, 170, 255, 0.9);
            font-size: 0.8rem;
        }

        .volume-slider-nano {
            flex: 1;
            max-width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .volume-level-nano {
            height: 100%;
            background: #7b2ff7;
            width: 70%;
            border-radius: 2px;
        }

        .playlist-controls-nano {
            display: flex;
            gap: 6px;
        }

        .playlist-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .playlist-btn.active {
            background: rgba(123, 47, 247, 0.3);
            color: #7b2ff7;
        }

        .status-message {
            position: fixed;
            bottom: 70px;
            right: 20px;
            background: rgba(20, 20, 35, 0.95);
            border: 1px solid rgba(123, 47, 247, 0.4);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.75rem;
            max-width: 90%;
            width: auto;
            z-index: 1001;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .status-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .status-message.success {
            border-left: 3px solid #2ecc71;
        }

        .status-message.error {
            border-left: 3px solid #e74c3c;
        }

        .upload-progress {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 35, 0.98);
            padding: 15px;
            border-radius: 10px;
            z-index: 3000;
            display: none;
            min-width: 200px;
            width: auto;
            border: 1px solid rgba(123, 47, 247, 0.3);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            animation: popIn 0.1s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translate(-50%, -40%) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 10px 0 5px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #7b2ff7, #f107a3);
            width: 0%;
            transition: width 0.1s ease;
        }

        .progress-text {
            font-size: 0.8rem;
            color: #aaaaff;
            text-align: center;
            margin-top: 5px;
        }

        .time-ms {
            font-size: 0.7rem;
            color: #7b2ff7;
            text-align: center;
            margin-top: 3px;
            font-weight: 600;
        }

        .touch-feedback:active {
            opacity: 0.7;
            transform: scale(0.98);
        }

        .join-float-container {
            position: fixed;
            top: 15px;
            right: 70px;
            z-index: 2500;
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid rgba(45, 127, 249, 0.6);
            border-radius: 14px;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            box-shadow: 0 0 30px rgba(45, 127, 249, 0.4);
            backdrop-filter: blur(10px);
        }

        .join-text {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFFFFF, #80B0FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 8px rgba(45, 127, 249, 0.5);
            position: relative;
        }

        .icons-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            width: 100%;
            position: relative;
        }

        .nav-orb {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: linear-gradient(145deg, rgba(25, 25, 40, 0.98), rgba(15, 15, 30, 0.98));
            backdrop-filter: blur(25px);
            border: 2px solid rgba(45, 127, 249, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6), 0 0 15px rgba(45, 127, 249, 0.3);
            position: relative;
            overflow: visible;
            text-decoration: none;
        }

        .nav-orb::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, rgba(45, 127, 249, 0.3) 0%, rgba(29, 93, 204, 0.2) 50%, rgba(45, 127, 249, 0.3) 100%);
            border-radius: 10px;
            z-index: 1;
            filter: blur(2px);
        }

        .nav-orb::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border-radius: 6px;
            background: linear-gradient(135deg, rgba(30, 35, 55, 0.95), rgba(15, 20, 35, 0.95));
            z-index: 2;
        }

        .nav-orb:hover {
            transform: scale(1.05) translateY(-2px);
            border-color: rgba(45, 127, 249, 1);
            box-shadow: 0 15px 30px rgba(0, 198, 255, 0.4), 0 0 20px rgba(45, 127, 249, 0.5);
        }

        .icon-box {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid;
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }

        .icon-box i {
            font-size: 14px;
            filter: drop-shadow(0 0 6px currentColor);
        }

        .nav-orb.youtube {
            border-color: rgba(255, 0, 0, 0.4);
        }

        .nav-orb.youtube .icon-box {
            border-color: #FF0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }

        .nav-orb.youtube .icon-box i {
            color: #FF0000;
            text-shadow: 0 0 8px #FF0000;
        }

        .nav-orb.tubidy {
            border-color: rgba(29, 185, 84, 0.4);
        }

        .nav-orb.tubidy .icon-box {
            border-color: #1DB954;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.4);
        }

        .nav-orb.tubidy .icon-box i {
            color: #1DB954;
            text-shadow: 0 0 8px #1DB954;
        }

        .hover-glow {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 4;
            pointer-events: none;
            top: -25%;
            left: -25%;
        }

        .nav-orb:hover .hover-glow {
            opacity: 0.6;
        }

        .nav-orb {
            animation: softPulse 3s infinite ease-in-out;
        }

        @keyframes softPulse {

            0%,
            100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.1);
            }
        }

        .join-text::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 15%;
            width: 70%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(45, 127, 249, 0.5), transparent);
        }

        .join-text::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 25%;
            width: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(45, 127, 249, 0.3), transparent);
        }

        .join-arrow {
            position: fixed;
            top: 30px;
            right: 190px;
            z-index: 2600;
            display: flex;
            align-items: center;
            gap: 4px;
            pointer-events: none;
            animation: joinArrowMove 1.8s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8));
            background: rgba(0, 0, 0, 0.15);
            padding: 4px 8px 4px 12px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 215, 0, 0.2);

                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);

                    request.onerror = () => {
                        console.error('IndexedDB error:', request.error);
                        reject(request.error);
                    };

                    request.onsuccess = () => {
                        this.db = request.result;
                        console.log('✅ IndexedDB connected with 14-day permanent cache');
                        resolve(this.db);
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;

                        // Store for user-uploaded songs
                        if (!db.objectStoreNames.contains('userSongs')) {
                            const userStore = db.createObjectStore('userSongs', { keyPath: 'id' });
                            userStore.createIndex('timestamp', 'timestamp', { unique: false });
                        }

                        // PERMANENT CACHE for default songs - 14 days
                        if (!db.objectStoreNames.contains('permanentCache')) {
                            const cacheStore = db.createObjectStore('permanentCache', { keyPath: 'id' });
                            cacheStore.createIndex('url', 'url', { unique: true });
                            cacheStore.createIndex('title', 'title', { unique: false });
                            cacheStore.createIndex('artist', 'artist', { unique: false });
                            cacheStore.createIndex('cachedAt', 'cachedAt', { unique: false }); // For expiry checking
                        }

                        // Background image cache
                        if (!db.objectStoreNames.contains('imageCache')) {
                            const imgStore = db.createObjectStore('imageCache', { keyPath: 'url' });
                            imgStore.createIndex('cachedAt', 'cachedAt', { unique: false });
                        }

                        // Cache metadata
                        if (!db.objectStoreNames.contains('cacheMetadata')) {
                            db.createObjectStore('cacheMetadata', { keyPath: 'key' });
                        }
                    };
                });
            }

            async ensureDB() {
                if (!this.db) {
                    await this.initPromise;
                }
                return this.db;
            }

            // Check if cache is expired (14 days)
            isCacheExpired(cachedAt) {
                return Date.now() - cachedAt > this.CACHE_DURATION;
            }

            // PERMANENT: Save song to cache for 14 days
            async saveToPermanentCache(songId, url, title, artist, blobData, fileType) {
                await this.ensureDB();

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['permanentCache'], 'readwrite');
                    const store = transaction.objectStore('permanentCache');

                    const cachedSong = {
                        id: songId,
                        url: url.split('?')[0], // Store base URL
                        fullUrl: url,
                        title: title,
                        artist: artist,
                        blobData: blobData,
                        fileType: fileType,
                        cachedAt: Date.now(),
                        expiresAt: Date.now() + this.CACHE_DURATION,
                        lastPlayed: Date.now(),
                        playCount: 0
                    };

                    const request = store.put(cachedSong);

                    request.onsuccess = () => {
                        console.log(`💾 CACHED for 14 days: ${title}`);
                        resolve(cachedSong);
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            // PERMANENT: Get from cache if not expired
            async getFromPermanentCache(url) {
                await this.ensureDB();

                const baseUrl = url.split('?')[0];

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['permanentCache'], 'readonly');
                    const store = transaction.objectStore('permanentCache');
                    const index = store.index('url');
                    const request = index.get(baseUrl);

                    request.onsuccess = () => {
                        const result = request.result;
                        if (result) {
                            // Check if expired (14 days)
                            if (this.isCacheExpired(result.cachedAt)) {
                                console.log(`⚠️ Cache expired for ${result.title}, will refresh`);
                                resolve(null); // Treat as not found, will re-fetch
                            } else {
                                // Update last played
                                this.updateCacheStats(result.id);
                                resolve(result);
                            }
                        } else {
                            resolve(null);
                        }
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            // Save image to cache as Base64
            async cacheImageAsBase64(url) {
                await this.ensureDB();

                try {
                    const response = await fetch(url, {
                        headers: {
                            'Cache-Control': 'max-age=1209600', // 14 days
                            'Pragma': 'cache'
                        }
                    });
                    const blob = await response.blob();

                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = async () => {
                            const base64data = reader.result;

                            // Store in IndexedDB
                            const transaction = this.db.transaction(['imageCache'], 'readwrite');
                            const store = transaction.objectStore('imageCache');

                            const imageData = {
                                url: url,
                                base64: base64data,
                                cachedAt: Date.now(),
                                expiresAt: Date.now() + this.CACHE_DURATION
                            };

                            store.put(imageData);
                            resolve(base64data);
                        };
                        reader.onerror = reject;
                        reader.readAsDataURL(blob);
                    });
                } catch (error) {
                    console.error('Failed to cache image:', error);
                    return null;
                }
            }

            // Get cached image
            async getCachedImage(url) {
                await this.ensureDB();

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['imageCache'], 'readonly');
                    const store = transaction.objectStore('imageCache');
                    const request = store.get(url);

                    request.onsuccess = () => {
                        const result = request.result;
                        if (result && !this.isCacheExpired(result.cachedAt)) {
                            resolve(result.base64);
                        } else {
                            resolve(null);
                        }
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            // Update cache stats
            async updateCacheStats(id) {
                const transaction = this.db.transaction(['permanentCache'], 'readwrite');
                const store = transaction.objectStore('permanentCache');
                const request = store.get(id);

                request.onsuccess = () => {
                    const song = request.result;
                    if (song) {
                        song.lastPlayed = Date.now();
                        song.playCount = (song.playCount || 0) + 1;
                        store.put(song);
                    }
                };
            }

            // Get all cached songs
            async getAllCachedSongs() {
                await this.ensureDB();

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['permanentCache'], 'readonly');
                    const store = transaction.objectStore('permanentCache');
                    const request = store.getAll();

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            // Save user song
            async saveUserSong(song) {
                await this.ensureDB();

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['userSongs'], 'readwrite');
                    const store = transaction.objectStore('userSongs');
                    if (!song.timestamp) song.timestamp = Date.now();
                    const request = store.put(song);

                    request.onsuccess = () => resolve(song);
                    request.onerror = () => reject(request.error);
                });
            }

            // Get all user songs
            async getAllUserSongs() {
                await this.ensureDB();

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['userSongs'], 'readonly');
                    const store = transaction.objectStore('userSongs');
                    const index = store.index('timestamp');
                    const request = index.openCursor(null, 'prev');

                    const songs = [];
                    request.onsuccess = (event) => {
                        const cursor = event.target.result;
                        if (cursor) {
                            songs.push(cursor.value);
                            cursor.continue();
                        } else {
                            resolve(songs);
                        }
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            // Delete user song
            async deleteUserSong(id) {
                await this.ensureDB();

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['userSongs'], 'readwrite');
                    const store = transaction.objectStore('userSongs');
                    const request = store.delete(id);

                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(request.error);
                });
            }

            // Clear all user songs
            async clearAllUserSongs() {
                await this.ensureDB();

                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction(['userSongs'], 'readwrite');
                    const store = transaction.objectStore('userSongs');
                    const request = store.clear();

                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(request.error);
                });
            }

            // Check if song is cached and not expired
            async isPermanentlyCached(url) {
                const cached = await this.getFromPermanentCache(url);
                return !!cached;
            }

            // Clear expired cache entries
            async clearExpiredCache() {
                await this.ensureDB();

                const transaction = this.db.transaction(['permanentCache'], 'readwrite');
                const store = transaction.objectStore('permanentCache');
                const request = store.getAll();

                request.onsuccess = () => {
                    const allSongs = request.result;
                    allSongs.forEach(song => {
                        if (this.isCacheExpired(song.cachedAt)) {
                            store.delete(song.id);
                            console.log(`🗑️ Removed expired cache: ${song.title}`);
                        }
                    });
                };
            }
        }

        // ===== BACKGROUND SYSTEM WITH BASE64 CACHING =====
        class BackgroundSystem {
            constructor(indexedDB) {
                this.indexedDB = indexedDB;
                this.media = [...ONLINE_BACKGROUNDS];
                this.currentIndex = 0;
                this.container = document.getElementById('background-container');
                this.cachedImages = new Map();
                this.init();
                setInterval(() => this.next(), 30000);
            }

            async init() {
                // Try to load cached images first
                await this.loadCachedImages();
                this.showCurrent();

                // Pre-cache all backgrounds in background
                this.preCacheAllBackgrounds();
            }

            async loadCachedImages() {
                for (const bg of this.media) {
                    const cached = await this.indexedDB.getCachedImage(bg.url);
                    if (cached) {
                        this.cachedImages.set(bg.url, cached);
                    }
                }
            }

            async preCacheAllBackgrounds() {
                for (const bg of this.media) {
                    if (!this.cachedImages.has(bg.url)) {
                        const base64 = await this.indexedDB.cacheImageAsBase64(bg.url);
                        if (base64) {
                            this.cachedImages.set(bg.url, base64);
                        }
                    }
                }
            }

            showCurrent() {
                const current = this.media[this.currentIndex];
                const container = this.container;

                // Check if we have cached version
                const cachedBase64 = this.cachedImages.get(current.url);

                const newImg = document.createElement('img');
                newImg.className = 'background-media active';

                if (cachedBase64) {
                    // Use cached Base64 - ZERO EGRESS
                    newImg.src = cachedBase64;
                } else {
                    // Use fallback or original (will be cached next time)
                    newImg.src = FALLBACK_BG_BASE64;
                    // Fetch and cache in background
                    this.indexedDB.cacheImageAsBase64(current.url).then(base64 => {
                        if (base64) {
                            this.cachedImages.set(current.url, base64);
                            if (this.currentIndex === this.media.indexOf(current)) {
                                newImg.src = base64;
                            }
                        }
                    });
                }

                const oldImages = container.querySelectorAll('img');
                oldImages.forEach(img => img.remove());
                container.appendChild(newImg);
            }

            next() {
                this.currentIndex = (this.currentIndex + 1) % this.media.length;
                this.showCurrent();
            }
        }

        // ===== MUSIC SYSTEM WITH ZERO EGRESS OPTIMIZATION =====
        class MusicSystem {
            constructor(indexedDB) {
                this.indexedDB = indexedDB;
                this.playlist = [];
                this.originalPlaylist = [];
                this.currentIndex = -1;
                this.isPlaying = false;
                this.shuffle = false;
                this.repeat = false;
                this.audio = document.getElementById('audio-player');
                this.blobUrls = new Map();
                this.STORAGE_KEY = 'willfortunate_player_state';
                this.cacheQueue = [];
                this.isCaching = false;

                // Disable all unnecessary requests
                this.audio.preload = 'metadata'; // Only load metadata initially
                this.audio.crossOrigin = 'anonymous';

                // Set long cache headers via meta tag
                this.setCacheHeaders();

                this.init();
            }

            setCacheHeaders() {
                // Add meta tag for long cache duration
                const meta = document.createElement('meta');
                meta.httpEquiv = 'Cache-Control';
                meta.content = 'max-age=1209600, stale-while-revalidate=86400';
                document.head.appendChild(meta);
            }

            async init() {
                // Clear expired cache first
                await this.indexedDB.clearExpiredCache();

                // Load default songs
                this.loadDefaultSongs();

                // Load user songs
                await this.loadUserSongs();

                // Check cache status
                await this.checkCacheStatus();

                // Update UI
                this.updateUI();

                // Bind events
                this.bindEvents();

                // Resume playback
                await this.resumeFromSavedState();
            }

            loadDefaultSongs() {
                DEFAULT_MUSIC.forEach((song, index) => {
                    if (song && song.url) {
                        const songObj = {
                            id: 'default_' + Date.now() + '_' + index + '_' + Math.random().toString(36).substr(2, 9),
                            url: song.url,
                            title: song.title || 'Unknown',
                            artist: song.artist || 'Unknown',
                            duration: '0:00',
                            isDefault: true,
                            source: 'supabase',
                            fileType: 'audio/mp4',
                            isCached: false,
                            cachedUrl: null
                        };
                        this.playlist.push(songObj);
                        this.originalPlaylist.push({ ...songObj });
                    }
                });
            }

            async loadUserSongs() {
                try {
                    const userSongs = await this.indexedDB.getAllUserSongs();
                    for (const song of userSongs) {
                        if (song && !this.playlist.find(s => s.id === song.id)) {
                            if (song.blobData) {
                                try {
                                    const mimeType = song.fileType || 'audio/mpeg';
                                    const blob = new Blob([song.blobData], { type: mimeType });
                                    const blobUrl = URL.createObjectURL(blob);
                                    this.blobUrls.set(song.id, blobUrl);

                                    const songObj = {
                                        ...song,
                                        url: blobUrl,
                                        blobData: undefined,
                                        isDefault: false,
                                        source: 'indexeddb',
                                        isCached: true
                                    };
                                    this.playlist.push(songObj);
                                    this.originalPlaylist.push({ ...songObj });
                                } catch (e) {
                                    console.warn('Failed to load user song:', e);
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error loading user songs:', error);
                }
            }

            async checkCacheStatus() {
                // Check which default songs are already cached and not expired
                for (const song of this.playlist.filter(s => s.isDefault)) {
                    const cached = await this.indexedDB.getFromPermanentCache(song.url);
                    if (cached) {
                        song.isCached = true;
                        song.cachedAt = cached.cachedAt;
                        if (cached.blobData) {
                            const blob = new Blob([cached.blobData], { type: cached.fileType });
                            const blobUrl = URL.createObjectURL(blob);
                            song.cachedUrl = blobUrl;
                            this.blobUrls.set(song.id, blobUrl);
                        }
                    }
                }

                // Start background caching for uncached songs
                this.cacheUncachedSongs();
            }

            async cacheUncachedSongs() {
                const uncached = this.playlist.filter(s => s.isDefault && !s.isCached);

                if (uncached.length === 0) {
                    console.log('✅ All songs are cached for 14 days - ZERO future egress');
                    return;
                }

                console.log(`🔄 Caching ${uncached.length} songs for 14 days...`);

                // Add to queue
                this.cacheQueue.push(...uncached);

                // Start caching process
                if (!this.isCaching) {
                    this.processCacheQueue();
                }
            }

            async processCacheQueue() {
                if (this.cacheQueue.length === 0) {
                    this.isCaching = false;
                    console.log('✅ All songs cached - Supabase egress will now be ZERO for 14 days');
                    return;
                }

                this.isCaching = true;
                const song = this.cacheQueue.shift();

                try {
                    this.showStatus(`Caching ${song.title} for 14 days...`, 'success');

                    // Fetch with long cache headers
                    const response = await fetch(song.url, {
                        headers: {
                            'Cache-Control': 'max-age=1209600', // 14 days
                            'Pragma': 'cache'
                        }
                    });

                    if (!response.ok) throw new Error('Failed to fetch');

                    const blob = await response.blob();
                    const arrayBuffer = await blob.arrayBuffer();

                    // Save to permanent cache with 14-day expiry
                    await this.indexedDB.saveToPermanentCache(
                        song.id,
                        song.url,
                        song.title,
                        song.artist,
                        arrayBuffer,
                        blob.type || 'audio/mp4'
                    );

                    // Create blob URL
                    const blobUrl = URL.createObjectURL(blob);
                    song.cachedUrl = blobUrl;
                    song.isCached = true;
                    this.blobUrls.set(song.id, blobUrl);

                    this.showStatus(`✅ ${song.title} cached for 14 days`, 'success');

                } catch (error) {
                    console.error(`Failed to cache ${song.title}:`, error);
                    this.showStatus(`Failed to cache ${song.title}`, 'error');
                }

                // Continue processing queue
                setTimeout(() => this.processCacheQueue(), 1000);
            }

            async getPlayableUrl(song) {
                // If it's a user song or already cached, use cached URL
                if (!song.isDefault || song.isCached) {
                    return song.cachedUrl || song.url;
                }

                // Check if permanently cached and not expired
                const cached = await this.indexedDB.getFromPermanentCache(song.url);
                if (cached && cached.blobData) {
                    const blob = new Blob([cached.blobData], { type: cached.fileType });
                    const blobUrl = URL.createObjectURL(blob);
                    song.cachedUrl = blobUrl;
                    song.isCached = true;
                    this.blobUrls.set(song.id, blobUrl);
                    return blobUrl;
                }

                // Not cached yet, use original URL (this will cause ONE request every 14 days max)
                return song.url;
            }

            async playSong(index, seekTime = 0) {
                if (index < 0 || index >= this.playlist.length) return;

                const song = this.playlist[index];

                // Get playable URL (cached or original)
                const playableUrl = await this.getPlayableUrl(song);

                this.audio.pause();
                this.audio.src = playableUrl;

                // Don't call load() - let browser use cache
                this.currentIndex = index;

                document.getElementById('song-title-nano').textContent = song.title || 'Unknown';
                document.getElementById('song-artist-nano').textContent = song.artist || 'Unknown';

                this.updateUI();

                const playHandler = () => {
                    if (seekTime > 0 && seekTime < this.audio.duration) {
                        this.audio.currentTime = seekTime;
                    }

                    this.audio.play()
                        .then(() => {
                            this.isPlaying = true;
                            this.updateButtons();
                            this.saveState();
                        })
                        .catch(error => {
                            console.log('Playback failed:', error);
                            this.isPlaying = false;
                            this.updateButtons();
                        });

                    this.audio.removeEventListener('canplaythrough', playHandler);
                };

                this.audio.addEventListener('canplaythrough', playHandler, { once: true });

                this.audio.onloadedmetadata = () => {
                    if (this.audio.duration && isFinite(this.audio.duration)) {
                        const mins = Math.floor(this.audio.duration / 60);
                        const secs = Math.floor(this.audio.duration % 60);
                        document.getElementById('duration-nano').textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                    }
                };
            }

            async resumeFromSavedState() {
                const saved = localStorage.getItem(this.STORAGE_KEY);

                if (saved) {
                    try {
                        const state = JSON.parse(saved);

                        // Check if state is too old (more than 14 days)
                        if (state.timestamp && (Date.now() - state.timestamp > 14 * 24 * 60 * 60 * 1000)) {
                            console.log('State expired, starting fresh');
                            localStorage.removeItem(this.STORAGE_KEY);
                            await this.playSong(0, 0);
                            return;
                        }

                        this.shuffle = state.shuffle || false;
                        this.repeat = state.repeat || false;
                        document.getElementById('shuffle-btn').classList.toggle('active', this.shuffle);
                        document.getElementById('repeat-btn').classList.toggle('active', this.repeat);

                        // Find the song
                        const songIndex = this.playlist.findIndex(s => s.id === state.songId);

                        if (songIndex !== -1) {
                            await this.playSong(songIndex, state.currentTime || 0);
                        } else {
                            await this.playSong(0, 0);
                        }
                    } catch (e) {
                        console.error('Failed to load saved state:', e);
                        await this.playSong(0, 0);
                    }
                } else {
                    await this.playSong(0, 0);
                }
            }

            readFileAsArrayBuffer(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(file);
                });
            }

            async uploadMusicFiles(files) {
                if (!files || files.length === 0) return;

                const audioFiles = Array.from(files).filter(file =>
                    file.type.startsWith('audio/') ||
                    file.name.match(/\.(mp3|m4a|aac|wav|ogg|flac|mp4)$/i)
                );

                if (audioFiles.length === 0) {
                    this.showStatus('No audio files selected', 'error');
                    return;
                }

                const progressEl = document.getElementById('upload-progress');
                const progressFill = document.getElementById('progress-bar-fill');
                const progressText = document.getElementById('progress-text');

                progressEl.style.display = 'block';
                progressFill.style.width = '0%';
                progressText.textContent = `0/${audioFiles.length}`;

                let uploadedCount = 0;
                const newSongs = [];

                for (let i = 0; i < audioFiles.length; i++) {
                    const file = audioFiles[i];

                    try {
                        const arrayBuffer = await this.readFileAsArrayBuffer(file);

                        const fileName = file.name.replace(/\.[^/.]+$/, '');
                        let title = fileName;
                        let artist = 'Unknown';

                        if (fileName.includes(' - ')) {
                            const parts = fileName.split(' - ');
                            artist = parts[0].trim();
                            title = parts.slice(1).join(' - ').trim();
                        }

                        const mimeType = file.type || 'audio/mpeg';

                        const blob = new Blob([arrayBuffer], { type: mimeType });
                        const blobUrl = URL.createObjectURL(blob);

                        const songId = 'user_' + Date.now() + '_' + i + '_' + Math.random().toString(36).substr(2, 9);

                        this.blobUrls.set(songId, blobUrl);

                        const newSong = {
                            id: songId,
                            url: blobUrl,
                            blobData: arrayBuffer,
                            fileType: mimeType,
                            title: title,
                            artist: artist,
                            duration: '0:00',
                            isDefault: false,
                            source: 'indexeddb',
                            timestamp: Date.now(),
                            isCached: true
                        };

                        // Save to IndexedDB
                        const songForDB = {
                            ...newSong,
                            url: undefined
                        };

                        await this.indexedDB.saveUserSong(songForDB);
                        newSongs.push(newSong);

                    } catch (error) {
                        console.error('Error processing file:', error);
                        this.showStatus(`Error processing ${file.name}`, 'error');
                    }

                    uploadedCount++;
                    const percent = (uploadedCount / audioFiles.length) * 100;
                    progressFill.style.width = percent + '%';
                    progressText.textContent = `${uploadedCount}/${audioFiles.length}`;
                }

                if (newSongs.length > 0) {
                    if (this.shuffle) {
                        this.originalPlaylist = [...newSongs, ...this.originalPlaylist];
                        this.playlist = [...this.originalPlaylist];
                        this.shufflePlaylist();
                    } else {
                        this.playlist = [...newSongs, ...this.playlist];
                        this.originalPlaylist = [...newSongs, ...this.originalPlaylist];
                    }

                    this.updateUI();
                    this.showStatus(`✅ ${newSongs.length} songs saved locally`, 'success');
                }

                setTimeout(() => {
                    progressEl.style.display = 'none';
                }, 500);
            }

            saveState() {
                if (this.currentIndex === -1 || !this.playlist[this.currentIndex]) return;

                const state = {
                    songId: this.playlist[this.currentIndex].id,
                    currentTime: this.audio.currentTime,
                    isPlaying: this.isPlaying,
                    volume: this.audio.volume,
                    shuffle: this.shuffle,
                    repeat: this.repeat,
                    timestamp: Date.now()
                };

                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(state));
            }

            toggleShuffle() {
                this.shuffle = !this.shuffle;
                document.getElementById('shuffle-btn').classList.toggle('active', this.shuffle);

                if (this.shuffle) {
                    const currentId = this.currentIndex >= 0 ? this.playlist[this.currentIndex]?.id : null;
                    this.shufflePlaylist();
                    if (currentId) {
                        const newIndex = this.playlist.findIndex(s => s.id === currentId);
                        if (newIndex !== -1) this.currentIndex = newIndex;
                    }
                } else {
                    const currentId = this.currentIndex >= 0 ? this.playlist[this.currentIndex]?.id : null;
                    this.playlist = this.originalPlaylist.map(s => ({ ...s }));
                    if (currentId) {
                        const newIndex = this.playlist.findIndex(s => s.id === currentId);
                        if (newIndex !== -1) this.currentIndex = newIndex;
                    }
                }

                this.updateUI();
                this.saveState();
            }

            shufflePlaylist() {
                for (let i = this.playlist.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.playlist[i], this.playlist[j]] = [this.playlist[j], this.playlist[i]];
                }
            }

            toggleRepeat() {
                this.repeat = !this.repeat;
                document.getElementById('repeat-btn').classList.toggle('active', this.repeat);
                this.saveState();
            }

            async removeSong(songId, event) {
                event.stopPropagation();

                const index = this.playlist.findIndex(s => s.id === songId);
                if (index === -1) return;

                const song = this.playlist[index];

                if (!song.isDefault) {
                    try {
                        await this.indexedDB.deleteUserSong(songId);

                        if (this.blobUrls.has(songId)) {
                            URL.revokeObjectURL(this.blobUrls.get(songId));
                            this.blobUrls.delete(songId);
                        }
                    } catch (error) {
                        console.error('Error deleting from IndexedDB:', error);
                    }
                }

                const originalIndex = this.originalPlaylist.findIndex(s => s.id === songId);
                if (originalIndex !== -1) this.originalPlaylist.splice(originalIndex, 1);

                if (index === this.currentIndex) {
                    this.audio.pause();
                    this.isPlaying = false;

                    if (this.playlist.length > 1) {
                        let nextIndex = index;
                        if (index < this.playlist.length - 1) {
                            // Play next
                        } else {
                            nextIndex = index - 1;
                        }

                        this.playlist.splice(index, 1);

                        if (nextIndex > index) {
                            this.currentIndex = nextIndex - 1;
                        } else {
                            this.currentIndex = nextIndex;
                        }

                        await this.playSong(this.currentIndex, 0);
                    } else {
                        this.currentIndex = -1;
                        this.audio.src = '';
                        document.getElementById('song-title-nano').textContent = 'No music';
                        document.getElementById('song-artist-nano').textContent = 'Upload to begin';
                        localStorage.removeItem(this.STORAGE_KEY);
                        this.playlist.splice(index, 1);
                    }
                } else {
                    this.playlist.splice(index, 1);
                    if (this.currentIndex > index) {
                        this.currentIndex--;
                    }
                }

                this.updateUI();
                this.updateButtons();
            }

            togglePlay() {
                if (!this.playlist.length) return;

                if (this.currentIndex === -1) {
                    this.playSong(0, 0);
                } else if (this.isPlaying) {
                    this.audio.pause();
                    this.isPlaying = false;
                    this.updateButtons();
                    this.saveState();
                } else {
                    this.audio.play()
                        .then(() => {
                            this.isPlaying = true;
                            this.updateButtons();
                            this.saveState();
                        })
                        .catch(error => {
                            console.log('Play failed:', error);
                        });
                }
            }

            next() {
                if (!this.playlist.length) return;

                let nextIndex;
                if (this.repeat) {
                    nextIndex = (this.currentIndex + 1) % this.playlist.length;
                } else {
                    if (this.currentIndex === this.playlist.length - 1) {
                        this.audio.pause();
                        this.isPlaying = false;
                        this.updateButtons();
                        this.saveState();
                        return;
                    } else {
                        nextIndex = this.currentIndex + 1;
                    }
                }

                this.playSong(nextIndex, 0);
            }

            prev() {
                if (!this.playlist.length) return;

                let prevIndex;
                if (this.repeat && this.currentIndex === 0) {
                    prevIndex = this.playlist.length - 1;
                } else if (this.currentIndex > 0) {
                    prevIndex = this.currentIndex - 1;
                } else {
                    this.audio.currentTime = 0;
                    return;
                }

                this.playSong(prevIndex, 0);
            }

            async clearAllUserSongs() {
                const userSongsCount = this.playlist.filter(s => !s.isDefault).length;

                if (userSongsCount === 0) {
                    this.showStatus('No user songs to clear', 'error');
                    return;
                }

                if (!confirm(`Clear all ${userSongsCount} user-uploaded songs?`)) return;

                try {
                    await this.indexedDB.clearAllUserSongs();

                    for (const [id, url] of this.blobUrls) {
                        if (id.startsWith('user_')) {
                            URL.revokeObjectURL(url);
                            this.blobUrls.delete(id);
                        }
                    }

                    this.playlist = this.playlist.filter(s => s.isDefault);
                    this.originalPlaylist = this.originalPlaylist.filter(s => s.isDefault);

                    if (this.playlist.length > 0) {
                        this.currentIndex = 0;
                        await this.playSong(0, 0);
                    } else {
                        this.currentIndex = -1;
                        this.audio.src = '';
                        this.isPlaying = false;
                        localStorage.removeItem(this.STORAGE_KEY);
                        document.getElementById('song-title-nano').textContent = 'No music';
                        document.getElementById('song-artist-nano').textContent = 'Upload to begin';
                    }

                    this.updateUI();
                    this.updateButtons();
                    this.showStatus('All user songs cleared', 'success');

                } catch (error) {
                    console.error('Error clearing songs:', error);
                    this.showStatus('Error clearing songs', 'error');
                }
            }

            showStatus(msg, type = 'success') {
                const el = document.getElementById('status-message');
                if (el) {
                    el.textContent = msg;
                    el.className = `status-message ${type} show`;
                    setTimeout(() => el.classList.remove('show'), 2000);
                }
            }

            updateUI() {
                const list = document.getElementById('songs-list');
                if (!list) return;

                if (this.playlist.length === 0) {
                    list.innerHTML = '<div class="empty-songs">No songs yet</div>';
                    return;
                }

                const fragment = document.createDocumentFragment();

                this.playlist.forEach((song, i) => {
                    const item = document.createElement('div');
                    item.className = `song-item ${i === this.currentIndex ? 'active' : ''}`;

                    const cacheIcon = song.isCached ?
                        `<i class="fas fa-check-circle" style="color: #2ecc71; font-size: 0.6rem; margin-left: 5px;" title="Cached for 14 days"></i>` :
                        (song.isDefault ? `<i class="fas fa-cloud" style="color: #7b2ff7; font-size: 0.6rem; margin-left: 5px;" title="From Supabase (will cache for 14 days)"></i>` : '');

                    item.innerHTML = `
                        <i class="fas fa-music"></i>
                        <div class="song-details">
                            <div class="song-item-title">${this.escapeHtml(song.title)} ${cacheIcon}</div>
                            <div class="song-item-info"><span>${this.escapeHtml(song.artist)}</span></div>
                        </div>
                        ${!song.isDefault ? '<button class="song-item-remove touch-feedback" data-id="' + song.id + '"><i class="fas fa-trash-alt"></i></button>' : ''}
                    `;

                    item.addEventListener('click', (e) => {
                        if (!e.target.closest('.song-item-remove')) {
                            this.playSong(i, 0);
                        }
                    });

                    const removeBtn = item.querySelector('.song-item-remove');
                    if (removeBtn) {
                        removeBtn.addEventListener('click', (e) => this.removeSong(song.id, e));
                    }

                    fragment.appendChild(item);
                });

                list.innerHTML = '';
                list.appendChild(fragment);

                if (this.currentIndex >= 0 && this.playlist[this.currentIndex]) {
                    const s = this.playlist[this.currentIndex];
                    document.getElementById('song-title-nano').textContent = s.title || 'Unknown';
                    document.getElementById('song-artist-nano').textContent = s.artist || 'Unknown';
                }
            }

            escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            updateButtons() {
                const icon1 = document.getElementById('play-pause-nano-icon');
                const icon2 = document.getElementById('play-pause-expanded-icon');
                if (icon1) icon1.className = this.isPlaying ? 'fas fa-pause' : 'fas fa-play';
                if (icon2) icon2.className = this.isPlaying ? 'fas fa-pause' : 'fas fa-play';
            }

            bindEvents() {
                document.getElementById('play-pause-nano').onclick = (e) => {
                    e.stopPropagation();
                    this.togglePlay();
                };

                document.getElementById('play-pause-expanded').onclick = () => this.togglePlay();
                document.getElementById('prev-nano').onclick = () => this.prev();
                document.getElementById('next-nano').onclick = () => this.next();

                document.getElementById('shuffle-btn').onclick = () => this.toggleShuffle();
                document.getElementById('repeat-btn').onclick = () => this.toggleRepeat();

                this.audio.ontimeupdate = () => {
                    if (!this.playlist.length || !this.audio.duration || !isFinite(this.audio.duration)) return;

                    const p = (this.audio.currentTime / this.audio.duration) * 100;
                    document.getElementById('progress-nano').style.width = p + '%';

                    const mins = Math.floor(this.audio.currentTime / 60);
                    const secs = Math.floor(this.audio.currentTime % 60);
                    document.getElementById('current-time-nano').textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

                    if (Math.floor(this.audio.currentTime) % 5 === 0) {
                        this.saveState();
                    }
                };

                this.audio.onended = () => {
                    this.next();
                    setTimeout(() => this.saveState(), 100);
                };

                this.audio.onpause = () => {
                    this.saveState();
                };

                this.audio.onplay = () => {
                    this.saveState();
                };

                document.getElementById('dashboard-header').onclick = () => {
                    document.getElementById('dashboard').classList.toggle('expanded');
                };

                document.getElementById('progress-bar-nano').onclick = (e) => {
                    if (!this.playlist.length || !this.audio.duration) return;
                    const r = e.currentTarget.getBoundingClientRect();
                    const p = (e.clientX - r.left) / r.width;
                    this.audio.currentTime = p * this.audio.duration;
                    this.saveState();
                };

                document.getElementById('volume-slider-nano').onclick = (e) => {
                    const r = e.currentTarget.getBoundingClientRect();
                    const v = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
                    this.audio.volume = v;
                    document.getElementById('volume-level-nano').style.width = (v * 100) + '%';
                    this.saveState();
                };

                document.getElementById('search-input').oninput = (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.song-item').forEach((item, i) => {
                        if (this.playlist[i]) {
                            const matches = (this.playlist[i].title || '').toLowerCase().includes(term) ||
                                (this.playlist[i].artist || '').toLowerCase().includes(term);
                            item.style.display = matches ? 'flex' : 'none';
                        }
                    });
                };

                window.addEventListener('beforeunload', () => {
                    this.saveState();
                });
            }
        }

        // ===== INITIALIZATION =====
        document.addEventListener('DOMContentLoaded', async () => {
            const indexedDB = new IndexedDBService();

            // Initialize systems
            const bgSystem = new BackgroundSystem(indexedDB);
            const musicSystem = new MusicSystem(indexedDB);

            window.musicSystem = musicSystem;

            // Ultra fast YouTube and Tubidy - open in new tab without referrer
            document.getElementById('youtube-btn').onclick = (e) => {
                e.preventDefault();
                window.open('https://youtube.com', '_blank', 'noopener,noreferrer');
            };

            document.getElementById('tubidy-btn').onclick = (e) => {
                e.preventDefault();
                window.open('https://tubidy.com', '_blank', 'noopener,noreferrer');
            };

            document.getElementById('back-button').onclick = () => window.history.back();

            document.getElementById('star-close-btn').onclick = () => {
                document.getElementById('modal-container').style.display = 'none';
            };

            document.getElementById('clear-all-btn').onclick = () => musicSystem.clearAllUserSongs();

            const uploadMusicBtn = document.getElementById('upload-music-btn');
            const musicFileInput = document.getElementById('music-file-input');

            uploadMusicBtn.onclick = () => {
                musicFileInput.click();
            };

            musicFileInput.onchange = (e) => {
                const files = e.target.files;
                if (files && files.length > 0) {
                    musicSystem.uploadMusicFiles(files);
                }
                musicFileInput.value = '';
            };

            document.getElementById('floating-name').style.display = 'block';

            // Pre-cache all default songs in background
            setTimeout(() => {
                musicSystem.cacheUncachedSongs();
            }, 5000);
        });
    </script>
</body>
